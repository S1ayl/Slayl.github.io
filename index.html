<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовый сайт</title>
    <style>
        /* Простые стили для центрирования и красоты */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .container {
            background: white;
            padding: 3rem 5rem;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            color: #2c3e50;
            letter-spacing: 2px;
        }
        .sub {
            margin-top: 1rem;
            color: #7f8c8d;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>тест</h1>
        <p class="sub">Тестовый сайт работает ✅</p>
    </div>
</body>
</html>
