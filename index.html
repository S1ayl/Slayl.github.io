<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blender Portfolio · 3D Artist</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    body {
      background: #1a0e0a;
      color: #f5e6d9;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* main container */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: #2f1a12;
      border-radius: 3rem 3rem 2rem 2rem;
      padding: 2rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      border: 1px solid #b64a2a;
    }

    /* header / lang toggle */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid #c95f3a;
      padding-bottom: 1.2rem;
    }

    .logo h1 {
      font-size: 2.2rem;
      font-weight: 600;
      background: linear-gradient(145deg, #ff7b3a, #d94f1e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .logo span {
      font-size: 1rem;
      background: #4a2518;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: #f0a58a;
      margin-left: 0.5rem;
      -webkit-text-fill-color: #f0a58a;
    }

    .lang-toggle {
      display: flex;
      gap: 0.3rem;
      background: #2f1a12;
      padding: 0.3rem;
      border-radius: 60px;
      border: 1px solid #b85a34;
    }
    .lang-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #dbaa92;
      cursor: pointer;
      transition: 0.2s;
    }
    .lang-btn.active {
      background: #d94f1e;
      color: #fff2e6;
      box-shadow: 0 4px 10px rgba(217, 79, 30, 0.4);
    }
    .lang-btn:hover {
      background: #b85a34;
      color: white;
    }

    /* sections */
    .section-title {
      font-size: 1.8rem;
      font-weight: 500;
      margin: 2rem 0 1.2rem 0;
      color: #ff8a55;
      border-left: 6px solid #e15f2b;
      padding-left: 1rem;
      letter-spacing: -0.3px;
    }

    /* editable experience */
    .exp-block {
      background: #23130e;
      border-radius: 28px;
      padding: 1.5rem 2rem;
      margin: 1rem 0 1.8rem 0;
      border: 1px solid #9f4d2e;
      box-shadow: inset 0 0 0 1px #4f2b1d;
    }
    .exp-item {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 2rem;
      padding: 0.8rem 0;
      border-bottom: 1px dashed #683b28;
    }
    .exp-item:last-child {
      border-bottom: none;
    }
    .exp-year {
      min-width: 100px;
      font-weight: 600;
      color: #f0936b;
    }
    .exp-desc {
      flex: 1;
      color: #efd5c4;
    }
    .exp-desc strong {
      color: #ff9f77;
    }
    .exp-edit {
      background: transparent;
      border: 1px solid #b85a34;
      color: #f0b69b;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      margin-left: 0.5rem;
    }
    .exp-edit:hover {
      background: #b85a34;
      color: white;
    }

    /* gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.8rem;
      margin: 1.5rem 0 2rem;
    }

    .gallery-card {
      background: #1f110b;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid #a55634;
      box-shadow: 0 8px 18px rgba(0,0,0,0.6);
      transition: transform 0.25s ease, box-shadow 0.3s;
      backdrop-filter: blur(2px);
    }
    .gallery-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 30px rgba(185, 70, 30, 0.3);
      border-color: #d96a3a;
    }

    .media-wrapper {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #0e0806;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .media-wrapper img, .media-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .media-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .card-footer {
      padding: 0.8rem 1rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e100a;
    }
    .card-footer .card-title {
      color: #f5c7b1;
      font-weight: 500;
    }
    .card-actions button {
      background: transparent;
      border: 1px solid #9f4d2e;
      color: #d99b7e;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .card-actions button:hover {
      background: #b85a34;
      color: white;
      border-color: #b85a34;
    }

    .add-media-btn {
      background: #3b2016;
      border: 2px dashed #b85a34;
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      color: #f0b69b;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      margin: 0.5rem 0 1rem;
    }
    .add-media-btn:hover {
      background: #4f2b1d;
      border-color: #d96a3a;
      color: white;
    }

    /* contact */
    .contact-section {
      margin-top: 3rem;
      padding-top: 1.8rem;
      border-top: 2px solid #b85a34;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .contact-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .contact-btn {
      background: #2d1911;
      border: 1px solid #b85a34;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      color: #f0cbb9;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: 0.2s;
      font-size: 1rem;
    }
    .contact-btn i {
      font-size: 1.3rem;
      color: #ff8a55;
    }
    .contact-btn:hover {
      background: #b85a34;
      color: white;
      border-color: #e0703a;
      box-shadow: 0 0 12px #d94f1e55;
    }
    .contact-edit {
      background: transparent;
      border: 1px solid #b85a34;
      color: #f0b69b;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .contact-edit:hover {
      background: #b85a34;
      color: white;
    }

    /* utility */
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }
    .mt-1 { margin-top: 0.5rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .hidden { display: none; }

    /* small screens */
    @media (max-width: 650px) {
      .container { padding: 1.5rem 1rem; }
      .logo h1 { font-size: 1.8rem; }
    }

    /* animation on load */
    .fade-in {
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .gallery-card { animation: fadeUp 0.5s ease both; animation-delay: 0.05s; }

    /* edit mode highlight */
    .editable {
      outline: 2px dashed transparent;
      transition: outline 0.15s;
    }
    .editable:focus {
      outline: 2px dashed #ff8a55;
      background: #2d1a12;
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- header -->
  <header class="header">
    <div class="logo">
      <h1>🧊 Blender <span>3D</span></h1>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en" id="langEn">ENG</button>
      <button class="lang-btn" data-lang="ru" id="langRu">RU</button>
    </div>
  </header>

  <!-- experience -->
  <section>
    <h2 class="section-title" id="expTitle">💼 Experience</h2>
    <div class="exp-block" id="expBlock">
      <!-- динамически рендерится из JS -->
    </div>
    <button class="add-media-btn" id="addExpBtn"><i class="fas fa-plus"></i> <span id="addExpLabel">Add experience</span></button>
  </section>

  <!-- gallery -->
  <section>
    <h2 class="section-title" id="galleryTitle">🖼️ Gallery</h2>
    <div class="gallery-grid" id="galleryGrid"></div>
    <button class="add-media-btn" id="addMediaBtn"><i class="fas fa-plus"></i> <span id="addMediaLabel">Add media</span></button>
  </section>

  <!-- contact -->
  <section class="contact-section">
    <div>
      <h3 style="color: #f0936b; font-weight: 400; letter-spacing: 0.5px;" id="contactTitle">📬 Contact me</h3>
      <div class="contact-links" id="contactLinks">
        <!-- динамически -->
      </div>
    </div>
    <button class="contact-edit" id="editContactBtn"><i class="fas fa-pen"></i> <span id="editContactLabel">Edit contacts</span></button>
  </section>
</div>

<script>
  (function() {
    // ----- i18n strings -----
    const strings = {
      en: {
        expTitle: '💼 Experience',
        galleryTitle: '🖼️ Gallery',
        contactTitle: '📬 Contact me',
        addExp: 'Add experience',
        addMedia: 'Add media',
        editContact: 'Edit contacts',
        yearPlaceholder: 'Year',
        descPlaceholder: 'Description',
        discord: 'Discord',
        telegram: 'Telegram',
        defaultExp: [
          { year: '2023 — now', desc: 'Freelance 3D artist · character sculpting' },
          { year: '2021 — 2023', desc: 'Blender studio · hard-surface & environments' },
        ]
      },
      ru: {
        expTitle: '💼 Опыт работы',
        galleryTitle: '🖼️ Галерея',
        contactTitle: '📬 Связаться со мной',
        addExp: 'Добавить опыт',
        addMedia: 'Добавить медиа',
        editContact: 'Редактировать контакты',
        yearPlaceholder: 'Год',
        descPlaceholder: 'Описание',
        discord: 'Дискорд',
        telegram: 'Телеграм',
        defaultExp: [
          { year: '2023 — сейчас', desc: 'Фриланс 3D-художник · скульптинг персонажей' },
          { year: '2021 — 2023', desc: 'Blender-студия · хард-сёрфейс и окружение' },
        ]
      }
    };

    // ----- state -----
    let currentLang = 'en';
    let expData = JSON.parse(JSON.stringify(strings.en.defaultExp)); // mutable
    let mediaData = []; // { type: 'image'|'video'|'youtube', src: string, title: string }
    let contactData = {
      discord: 'https://discord.com/users/yourid',
      telegram: 'https://t.me/yourusername'
    };

    // ----- DOM refs -----
    const expBlock = document.getElementById('expBlock');
    const galleryGrid = document.getElementById('galleryGrid');
    const expTitle = document.getElementById('expTitle');
    const galleryTitle = document.getElementById('galleryTitle');
    const contactTitle = document.getElementById('contactTitle');
    const addExpLabel = document.getElementById('addExpLabel');
    const addMediaLabel = document.getElementById('addMediaLabel');
    const editContactLabel = document.getElementById('editContactLabel');
    const contactLinks = document.getElementById('contactLinks');

    // ----- render functions -----
    function renderExperience() {
      expBlock.innerHTML = '';
      expData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'exp-item fade-in';
        div.innerHTML = `
          <span class="exp-year" contenteditable="false">${item.year}</span>
          <span class="exp-desc" contenteditable="false"><strong>·</strong> ${item.desc}</span>
          <button class="exp-edit" data-index="${index}"><i class="fas fa-pen"></i> edit</button>
          <button class="exp-edit" style="border-color:#8f3f22;" data-index="${index}" data-del><i class="fas fa-trash"></i></button>
        `;
        expBlock.appendChild(div);

        // edit toggle
        const editBtn = div.querySelector('.exp-edit:not([data-del])');
        const yearSpan = div.querySelector('.exp-year');
        const descSpan = div.querySelector('.exp-desc');
        editBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const isEditable = yearSpan.getAttribute('contenteditable') === 'true';
          if (isEditable) {
            // save
            expData[index].year = yearSpan.innerText.trim();
            expData[index].desc = descSpan.innerText.replace('·', '').trim();
            yearSpan.setAttribute('contenteditable', 'false');
            descSpan.setAttribute('contenteditable', 'false');
            yearSpan.style.outline = 'none';
            descSpan.style.outline = 'none';
            editBtn.innerHTML = '<i class="fas fa-pen"></i> edit';
          } else {
            yearSpan.setAttribute('contenteditable', 'true');
            descSpan.setAttribute('contenteditable', 'true');
            yearSpan.focus();
            editBtn.innerHTML = '<i class="fas fa-save"></i> save';
          }
        });

        // delete
        const delBtn = div.querySelector('[data-del]');
        delBtn.addEventListener('click', function() {
          if (confirm('Remove this entry?')) {
            expData.splice(index, 1);
            renderExperience();
            updateLangStrings();
          }
        });
      });
    }

    function renderGallery() {
      galleryGrid.innerHTML = '';
      if (mediaData.length === 0) {
        galleryGrid.innerHTML = `<div style="grid-column:1/-1; padding:2rem; text-align:center; color:#b8866a;">✨ No media yet. Click "Add media"</div>`;
        return;
      }
      mediaData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'gallery-card fade-in';
        let mediaHtml = '';
        if (item.type === 'image') {
          mediaHtml = `<img src="${item.src}" alt="${item.title || 'image'}" loading="lazy">`;
        } else if (item.type === 'video') {
          mediaHtml = `<video controls preload="metadata" poster="${item.poster || ''}"><source src="${item.src}" type="video/mp4"></video>`;
        } else if (item.type === 'youtube') {
          // embed youtube
          const vid = extractYouTubeId(item.src);
          if (vid) {
            mediaHtml = `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe>`;
          } else {
            mediaHtml = `<div style="padding:1rem;color:#b8866a;">Invalid YouTube URL</div>`;
          }
        }
        card.innerHTML = `
          <div class="media-wrapper">${mediaHtml}</div>
          <div class="card-footer">
            <span class="card-title">${item.title || 'Untitled'}</span>
            <div class="card-actions">
              <button data-editmedia="${index}"><i class="fas fa-pen"></i></button>
              <button data-delmedia="${index}"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
        galleryGrid.appendChild(card);

        // edit media (title & src)
        card.querySelector('[data-editmedia]')?.addEventListener('click', function(e) {
          e.stopPropagation();
          const newTitle = prompt('Media title:', item.title || '');
          if (newTitle !== null) item.title = newTitle || 'Untitled';
          const newSrc = prompt('Media URL (image/video/youtube):', item.src);
          if (newSrc !== null) {
            item.src = newSrc;
            // detect type
            if (newSrc.includes('youtube.com') || newSrc.includes('youtu.be')) {
              item.type = 'youtube';
            } else if (newSrc.match(/\.(mp4|webm|mov)/i)) {
              item.type = 'video';
            } else {
              item.type = 'image';
            }
          }
          renderGallery();
          updateLangStrings();
        });

        card.querySelector('[data-delmedia]')?.addEventListener('click', function() {
          if (confirm('Delete this media?')) {
            mediaData.splice(index, 1);
            renderGallery();
            updateLangStrings();
          }
        });
      });
    }

    function extractYouTubeId(url) {
      if (!url) return null;
      const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function renderContact() {
      contactLinks.innerHTML = `
        <a href="${contactData.discord}" target="_blank" class="contact-btn"><i class="fab fa-discord"></i> <span id="discordLabel">${strings[currentLang].discord}</span></a>
        <a href="${contactData.telegram}" target="_blank" class="contact-btn"><i class="fab fa-telegram-plane"></i> <span id="telegramLabel">${strings[currentLang].telegram}</span></a>
      `;
    }

    function updateLangStrings() {
      const lang = currentLang;
      expTitle.innerText = strings[lang].expTitle;
      galleryTitle.innerText = strings[lang].galleryTitle;
      contactTitle.innerText = strings[lang].contactTitle;
      addExpLabel.innerText = strings[lang].addExp;
      addMediaLabel.innerText = strings[lang].addMedia;
      editContactLabel.innerText = strings[lang].editContact;
      // dynamic contact labels
      const discordLabel = document.getElementById('discordLabel');
      const telegramLabel = document.getElementById('telegramLabel');
      if (discordLabel) discordLabel.innerText = strings[lang].discord;
      if (telegramLabel) telegramLabel.innerText = strings[lang].telegram;
    }

    // ----- add media (smart) -----
    function addMediaFromPrompt() {
      const src = prompt('Enter media URL (image, video .mp4, or YouTube link):');
      if (!src) return;
      let type = 'image';
      if (src.includes('youtube.com') || src.includes('youtu.be')) type = 'youtube';
      else if (src.match(/\.(mp4|webm|mov|avi)/i)) type = 'video';
      const title = prompt('Media title:', 'Work ' + (mediaData.length+1));
      mediaData.push({ type, src, title: title || 'Untitled' });
      renderGallery();
      updateLangStrings();
    }

    // ----- add experience -----
    function addExperience() {
      const lang = currentLang;
      const year = prompt('Year / period:', '2024');
      const desc = prompt('Description:', lang === 'en' ? 'New role' : 'Новая роль');
      if (year !== null && desc !== null) {
        expData.push({ year: year || '—', desc: desc || '—' });
        renderExperience();
        updateLangStrings();
      }
    }

    // ----- edit contacts -----
    function editContacts() {
      const newDiscord = prompt('Discord URL (or username):', contactData.discord);
      if (newDiscord !== null) contactData.discord = newDiscord || '#';
      const newTelegram = prompt('Telegram URL (or username):', contactData.telegram);
      if (newTelegram !== null) contactData.telegram = newTelegram || '#';
      renderContact();
      updateLangStrings();
    }

    // ----- init with some sample media -----
    function initSampleMedia() {
      mediaData = [
        { type: 'image', src: 'https://placehold.co/600x400/3f2016/ff8a55?text=Blender+Render', title: 'Character sculpt' },
        { type: 'image', src: 'https://placehold.co/600x400/4d2b1e/e07a4a?text=Environment', title: 'Environment' },
        { type: 'youtube', src: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ', title: 'Demo reel' }
      ];
    }
    initSampleMedia();

    // ----- event listeners -----
    document.getElementById('addMediaBtn').addEventListener('click', addMediaFromPrompt);
    document.getElementById('addExpBtn').addEventListener('click', addExperience);
    document.getElementById('editContactBtn').addEventListener('click', editContacts);

    // language toggle
    document.getElementById('langEn').addEventListener('click', function() {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentLang = 'en';
      // reset expData to default EN if empty? but we keep user data, only change strings
      // if user wants fresh, but we keep data.
      updateLangStrings();
      renderContact(); 
      // re-render exp and gallery with current data (no data change)
      renderExperience();
      renderGallery();
    });
    document.getElementById('langRu').addEventListener('click', function() {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentLang = 'ru';
      updateLangStrings();
      renderContact();
      renderExperience();
      renderGallery();
    });

    // initial render
    renderExperience();
    renderGallery();
    renderContact();
    updateLangStrings();

    // enable content editable styling on focus (global)
    document.addEventListener('focusin', function(e) {
      if (e.target.getAttribute('contenteditable') === 'true') {
        e.target.style.outline = '2px dashed #ff8a55';
      }
    });
    document.addEventListener('focusout', function(e) {
      if (e.target.getAttribute('contenteditable') === 'true') {
        e.target.style.outline = 'none';
      }
    });
  })();
</script>
</body>
</html>
